<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jinho.kim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #111111;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    /* ── HEADER ── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 36px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-brand {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: row;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0;
    }

    .nav-item {
      position: relative;
      display: inline;
    }

    .nav-label::after {
      content: '\00a0\00a0';
    }

    .nav-label {
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      color: #111;
      opacity: 0.5;
      cursor: pointer;
      user-select: none;
    }

    .nav-item.open > .nav-label { opacity: 1; }

    .sub-list {
      list-style: none;
      display: none;
      flex-direction: column;
      gap: 2px;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      white-space: nowrap;
      z-index: 101;
    }

    .sub-list.horizontal {
      flex-direction: row;
      gap: 8px;
    }

    .nav-item.open .sub-list { display: flex; }

    .sub-list a {
      font-size: 0.65rem;
      letter-spacing: 0.02em;
      color: #111;
      text-decoration: none;
      opacity: 0.35;
      display: block;
    }

    .sub-list a:hover { opacity: 0.7; }
    .sub-list a.active { opacity: 1; }

    .header-right {
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      opacity: 0.5;
      text-decoration: none;
      color: #111;
    }

    .header-right:hover { opacity: 1; }

    /* ── MOBILE ── */
    #mobile-sub-bar { display: none; }

    @media (max-width: 768px) {
      #site-header { padding: 20px; }
      .sub-list { display: none !important; }

      #mobile-sub-bar {
        display: none;
        position: fixed;
        left: 20px;
        z-index: 200;
        padding: 0;
      }

      #mobile-sub-bar.open { display: block; }

      #mobile-sub-list {
        list-style: none;
        display: flex;
        gap: 20px;
      }

      #mobile-sub-list a {
        font-size: 0.65rem;
        letter-spacing: 0.02em;
        color: #111;
        text-decoration: none;
        opacity: 0.35;
        white-space: nowrap;
      }

      #mobile-sub-list a:hover { opacity: 0.7; }
      #mobile-sub-list a.active { opacity: 1; }
    }

    /* ── PHOTO STAGE ── */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo {
      position: absolute;
      max-height: 80vh;
      max-width: 62vw;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .photo.active { opacity: 1; }

    /* ── GALLERY MODE ── */
    #stage.gallery .photo { opacity: 0 !important; }

    #gallery-title {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translateX(-50%) translateY(-50%);
      width: auto;
      padding: 0;
      text-align: center;
      pointer-events: none;
      z-index: 50;
    }

    #gallery-title .g-main {
      font-family: 'EB Garamond', serif;
      font-size: 3.6rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #111;
      line-height: 1.05;
      margin-bottom: 14px;
    }

    #gallery-title .g-sub {
      font-size: 0.8rem;
      font-weight: 300;
      color: #111;
      opacity: 0.45;
      letter-spacing: 0.01em;
    }

    #stage.gallery + #gallery-overlay { display: block; }
    #stage.gallery ~ #gallery-title   { display: block; }
    #stage.gallery ~ #counter         { display: none; }

    #gallery-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      cursor: pointer;
    }

    /* ── COUNTER ── */
    #counter {
      position: fixed;
      bottom: 28px;
      right: 36px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      opacity: 0.3;
      z-index: 100;
    }

    @media (max-width: 600px) {
      .photo { max-width: 90vw; max-height: 72vh; }
    }

    @media (max-width: 768px) {
      #gallery-title {
        width: 90vw;
        left: 50%;
        right: auto;
        transform: translateX(-50%) translateY(-50%);
        padding: 0;
        text-align: center;
      }
      #gallery-title .g-main { font-size: 2.4rem; white-space: nowrap; }
      #gallery-title .g-sub  { white-space: nowrap; }
    }

    /* ── GRID VIEW (Interior) ── */
    #grid-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 80;
      overflow-y: auto;
      padding: 100px 36px 60px;
    }

    #grid-view.open { display: block; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px 24px;
    }

    .grid-item {
      cursor: pointer;
    }

    .grid-item-thumb {
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #f0f0f0;
      margin-bottom: 10px;
    }

    .grid-item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }

    .grid-item:hover .grid-item-thumb img { opacity: 0.85; }

    .grid-item-name {
      font-size: 0.8rem;
      font-weight: 300;
      color: #111;
      letter-spacing: 0.01em;
    }

    .grid-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      font-size: 0.8rem;
      color: #aaa;
    }

    @media (max-width: 768px) {
      #grid-view { padding: 80px 20px 40px; }
      .grid-container { grid-template-columns: repeat(2, 1fr); gap: 20px 14px; }
    }

    /* ── SPLIT VIEW (Wedding) ── */
    #split-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 80;
    }

    #split-view.open { display: flex; }

    /* 왼쪽: 대표 사진 고정 */
    #split-main {
      flex: 0 0 55%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      background: #fff;
      padding: 80px 12px 20px 36px;
    }

    #split-main-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    /* 오른쪽: 불규칙 그리드, 스크롤 가능, 스크롤바 숨김 */
    #split-thumbs {
      flex: 1;
      overflow-y: scroll;
      padding: 80px 28px 20px 4px;
      scrollbar-width: none; /* Firefox */
    }

    #split-thumbs::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .split-masonry {
      columns: 2;
      column-gap: 6px;
    }

    .split-thumb {
      cursor: pointer;
      overflow: hidden;
      background: #f0f0f0;
      break-inside: avoid;
      margin-bottom: 6px;
    }

    /* 불규칙 사이즈 */
    .split-thumb:nth-child(4n+1) { aspect-ratio: 3/4; }
    .split-thumb:nth-child(4n+2) { aspect-ratio: 4/3; }
    .split-thumb:nth-child(4n+3) { aspect-ratio: 1/1; }
    .split-thumb:nth-child(4n+4) { aspect-ratio: 3/4; }

    .split-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.15s;
      display: block;
    }

    .split-thumb:hover img { opacity: 0.75; }
    .split-thumb.active img { opacity: 0.4; }

    @media (max-width: 768px) {
      #split-view { flex-direction: column; }
      #split-main  { flex: 0 0 50vh; padding: 70px 20px 16px; }
      #split-thumbs { padding: 16px 20px 40px; }
      .split-masonry { grid-template-columns: repeat(3, 1fr); gap: 5px; }
      .split-thumb:nth-child(n) { aspect-ratio: 1/1; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <div class="header-left">
      <span class="header-brand">jinho.kim</span>
      <nav id="main-nav">
        <ul class="nav-list" id="nav-list"></ul>
      </nav>
    </div>
    <a class="header-right" href="https://www.instagram.com/__peart?igsh=MTVoaG02NW1qMXJvOQ==" target="_blank" rel="noopener">Contact ↗</a>
  </header>

  <div id="mobile-sub-bar">
    <ul id="mobile-sub-list"></ul>
  </div>

  <div id="stage"></div>
  <div id="gallery-overlay"></div>
  <div id="gallery-title"></div>
  <div id="counter"></div>
  <div id="grid-view">
    <div class="grid-container" id="grid-container"></div>
  </div>

  <div id="split-view">
    <div id="split-main">
      <img id="split-main-img" src="" alt="">
    </div>
    <div id="split-thumbs">
      <div class="split-masonry" id="split-masonry"></div>
    </div>
  </div>

  <script>
    (async () => {
      // ── Cloudinary 이미지 최적화 헬퍼 ──
      function optimizeImg(src, { w = 2000, q = 'auto', thumb = false } = {}) {
        if (!src || !src.includes('res.cloudinary.com')) return src;
        const params = thumb
          ? 'f_auto,q_auto,w_600'
          : `f_auto,q_${q},w_${w}`;
        return src.replace('/upload/', `/upload/${params}/`);
      }

      // ── data.json 로드 ──
      let siteData;
      try {
        const res = await fetch('./data.json?t=' + Date.now());
        siteData = await res.json();
      } catch (e) {
        console.error('data.json 로드 실패', e);
        return;
      }

      const { allPhotos, categories } = siteData;

      // ── 포토 스테이지 구성 (intro-cover 첫 번째, 나머지 셔플) ──
      const introPhoto = allPhotos[0];
      const rest = allPhotos.slice(1);
      for (let i = rest.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [rest[i], rest[j]] = [rest[j], rest[i]];
      }
      const all = [introPhoto, ...rest];
      const N = all.length;

      const stage   = document.getElementById('stage');
      const counter = document.getElementById('counter');

      const PRELOAD_RANGE = 8;
      const loadedSet = new Set();

      all.forEach((src, i) => {
        const img = document.createElement('img');
        img.className = 'photo' + (i === 0 ? ' active' : '');
        img.dataset.originalSrc = src;
        img.dataset.lazySrc = optimizeImg(src);
        if (i === 0) { img.src = img.dataset.lazySrc; loadedSet.add(0); }
        img.alt = '';
        stage.appendChild(img);
      });

      const photos = Array.from(stage.querySelectorAll('.photo'));
      let current = 0;

      function loadPhoto(idx) {
        return new Promise(resolve => {
          if (loadedSet.has(idx)) { resolve(); return; }
          const img = photos[idx];
          if (!img.dataset.lazySrc) { resolve(); return; }
          img.src = img.dataset.lazySrc;
          loadedSet.add(idx);
          if (img.complete) { resolve(); return; }
          img.onload = () => resolve();
          img.onerror = () => resolve();
        });
      }

      function preloadAround(center, indices) {
        const list = indices || Array.from({ length: N }, (_, i) => i);
        const ci = indices ? list.indexOf(center) : center;
        if (ci === -1) return Promise.resolve();
        const start = Math.max(0, ci - PRELOAD_RANGE);
        const end = Math.min(list.length - 1, ci + PRELOAD_RANGE);
        const promises = [];
        for (let k = start; k <= end; k++) {
          promises.push(loadPhoto(list[k]));
        }
        return Promise.all(promises);
      }
      preloadAround(0);
      let busy = false;
      let catPhotoMode = false;
      let catPhotoIndices = [];
      let catCurrent = 0;

      counter.textContent = `01 / ${String(N).padStart(2, '0')}`;

      // ── 카테고리 데이터 맵 ──
      const subDataMap   = {};  // catId -> [subName, ...]
      const subInfoMap   = {};  // subName -> { title, subtitle, type }
      const catPhotosMap = {};  // subName -> [photoSrc, ...]
      const gridDataMap  = {};  // catId -> sub  (type=grid)
      const splitDataMap = {};  // subName -> [photoSrc, ...]  (type=split)

      categories.forEach(cat => {
        subDataMap[cat.id] = cat.subcategories.map(s => s.name);
        cat.subcategories.forEach(sub => {
          subInfoMap[sub.name]   = { title: sub.title, subtitle: sub.subtitle, type: sub.type };
          catPhotosMap[sub.name] = sub.photos || [];
          if (sub.type === 'grid')  gridDataMap[cat.id]    = sub;
          if (sub.type === 'split') splitDataMap[sub.name] = sub.photos || [];
        });
      });

      // ── Nav 동적 생성 ──
      const navList = document.getElementById('nav-list');
      categories.forEach(cat => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.dataset.cat = cat.id;
        const hasSpecialType = cat.subcategories.some(s => s.type === 'grid' || s.type === 'split');
        li.innerHTML = `
          <span class="nav-label">${cat.label}</span>
          <ul class="sub-list${hasSpecialType ? ' horizontal' : ''}">
            ${cat.subcategories.map(s => `<li><a href="#">${s.name}</a></li>`).join('')}
          </ul>`;
        navList.appendChild(li);
      });

      // ── 포토 전환 ──
      function goTo(idx) {
        if (busy) return;
        if (catPhotoMode) {
          idx = Math.max(0, Math.min(catPhotoIndices.length - 1, idx));
          if (idx === catCurrent) return;
          busy = true;
          // 카테고리 모드에선 enterPhotoMode에서 이미 전부 로드됨
          photos[catPhotoIndices[catCurrent]].classList.remove('active');
          photos[catPhotoIndices[idx]].classList.add('active');
          catCurrent = idx;
          counter.textContent = `${String(catCurrent + 1).padStart(2, '0')} / ${String(catPhotoIndices.length).padStart(2, '0')}`;
          setTimeout(() => { busy = false; }, 200);
          return;
        }
        idx = Math.max(0, Math.min(N - 1, idx));
        if (idx === current) return;
        busy = true;
        // 다음 사진 즉시 로드 + 주변 프리로드
        if (!loadedSet.has(idx) && photos[idx].dataset.lazySrc) {
          photos[idx].src = photos[idx].dataset.lazySrc;
          loadedSet.add(idx);
        }
        preloadAround(idx);
        photos[current].classList.remove('active');
        photos[idx].classList.add('active');
        current = idx;
        counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(N).padStart(2, '0')}`;
        setTimeout(() => { busy = false; }, 200);
      }

      function enterPhotoMode(subName) {
        const photoSet = catPhotosMap[subName] || [];
        if (!photoSet.length) return;
        catPhotoMode = true;
        photos.forEach(p => p.classList.remove('active'));
        catPhotoIndices = [];
        photos.forEach((p, i) => {
          const psrc = decodeURIComponent(p.dataset.originalSrc || '');
          if (photoSet.some(ps => {
            const normalized = ps.startsWith('http') ? ps : ps.replace('./', '');
            return psrc.endsWith(normalized) || psrc.includes(normalized) || normalized.endsWith(psrc.split('/').pop());
          })) {
            catPhotoIndices.push(i);
          }
        });
        if (!catPhotoIndices.length) { catPhotoMode = false; return; }
        // 해당 카테고리 사진 전체 즉시 로드
        catPhotoIndices.forEach(idx => {
          if (!loadedSet.has(idx) && photos[idx].dataset.lazySrc) {
            photos[idx].src = photos[idx].dataset.lazySrc;
            loadedSet.add(idx);
          }
        });
        catCurrent = 0;
        photos[catPhotoIndices[0]].classList.add('active');
        counter.textContent = `01 / ${String(catPhotoIndices.length).padStart(2, '0')}`;
      }

      function exitPhotoMode() {
        catPhotoMode = false;
        photos.forEach(p => p.classList.remove('active'));
        photos[current].classList.add('active');
        counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(N).padStart(2, '0')}`;
      }

      // ── 스크롤 / 스와이프 ── (wheel은 아래 통합 처리)

      const SWIPE_THRESHOLD = 55;
      let touchX = null, touchAccum = 0;

      window.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchAccum = 0; }, { passive: true });
      window.addEventListener('touchmove', e => {
        if (touchX === null || galleryMode) return;
        const dx = touchX - e.touches[0].clientX;
        touchX = e.touches[0].clientX;
        touchAccum += dx;
        while (touchAccum >=  SWIPE_THRESHOLD) { goTo((catPhotoMode ? catCurrent : current) + 1); touchAccum -= SWIPE_THRESHOLD; }
        while (touchAccum <= -SWIPE_THRESHOLD) { goTo((catPhotoMode ? catCurrent : current) - 1); touchAccum += SWIPE_THRESHOLD; }
      }, { passive: true });
      window.addEventListener('touchend', () => { touchX = null; touchAccum = 0; });

      // ── 갤러리 모드 ──
      const mobileSubBar  = document.getElementById('mobile-sub-bar');
      const mobileSubList = document.getElementById('mobile-sub-list');
      const galleryTitle  = document.getElementById('gallery-title');
      const gridView      = document.getElementById('grid-view');
      const gridContainer = document.getElementById('grid-container');
      const splitView     = document.getElementById('split-view');
      const splitMainImg  = document.getElementById('split-main-img');
      const splitMasonry  = document.getElementById('split-masonry');
      const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

      let galleryMode = false;
      let gridViewMode = false;
      let splitViewMode = false;
      let currentActiveLink = null;
      let galleryTimer = null;

      // ── 스플릿 뷰 (Wedding) ──
      function openSplitView(subName) {
        const photoSet = splitDataMap[subName] || [];
        if (!photoSet.length) return;
        splitViewMode = true;

        // 썸네일 렌더 — src 비워두고 IntersectionObserver로 lazy load
        splitMasonry.innerHTML = photoSet.map((src, i) => `
          <div class="split-thumb${i === 0 ? ' active' : ''}" data-src="${src}">
            <img data-lazy="${optimizeImg(src, { thumb: true })}" alt="">
          </div>`).join('');

        // 대표 사진 초기값
        splitMainImg.src = optimizeImg(photoSet[0]);

        // 썸네일 lazy loading (IntersectionObserver)
        const splitThumbsEl = document.getElementById('split-thumbs');
        const splitObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (img.dataset.lazy) {
                img.src = img.dataset.lazy;
                delete img.dataset.lazy;
              }
              splitObserver.unobserve(img);
            }
          });
        }, { root: splitThumbsEl, rootMargin: '200px 0px' });

        splitMasonry.querySelectorAll('.split-thumb img').forEach(img => {
          splitObserver.observe(img);
        });

        // 썸네일 클릭 이벤트
        splitMasonry.querySelectorAll('.split-thumb').forEach(thumb => {
          thumb.addEventListener('click', () => {
            splitMasonry.querySelectorAll('.split-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
            splitMainImg.style.opacity = '0';
            setTimeout(() => {
              splitMainImg.src = optimizeImg(thumb.dataset.src);
              splitMainImg.style.opacity = '1';
            }, 150);
          });
        });

        splitView.classList.add('open');
        counter.style.display = 'none';
      }

      function closeSplitView() {
        splitViewMode = false;
        splitView.classList.remove('open');
        counter.style.display = '';
      }

      // ── 그리드 뷰 ──
      function openGridView(catId) {
        const sub = gridDataMap[catId];
        if (!sub) return;
        gridViewMode = true;
        const projects = sub.projects || [];
        gridContainer.innerHTML = projects.length === 0
          ? `<div class="grid-empty">아직 등록된 프로젝트가 없습니다.</div>`
          : projects.map(p => `
              <div class="grid-item">
                <div class="grid-item-thumb">
                  ${p.coverPhoto ? `<img src="${optimizeImg(p.coverPhoto, { thumb: true })}" alt="${p.name}" loading="lazy">` : ''}
                </div>
                <div class="grid-item-name">${p.name}</div>
              </div>`).join('');
        gridView.classList.add('open');
        counter.style.display = 'none';
      }

      function closeGridView() {
        gridViewMode = false;
        gridView.classList.remove('open');
        counter.style.display = '';
      }

      function enterGallery(title, activeLink) {
        currentActiveLink = activeLink;
        galleryMode = true;
        catPhotoMode = false;
        stage.classList.add('gallery');
        clearTimeout(galleryTimer);
        galleryTimer = setTimeout(() => {
          if (galleryMode) {
            const link = currentActiveLink;
            exitGallery();
            enterPhotoMode(title);
            if (link) link.classList.add('active');
          }
        }, 2000);

        const info = subInfoMap[title] || {};
        const displayTitle = info.title || title;
        const displaySub   = info.subtitle || '';
        galleryTitle.innerHTML = `<div class="g-main">${displayTitle}</div>${displaySub ? `<div class="g-sub">${displaySub}</div>` : ''}`;

        document.querySelectorAll('.sub-list a, #mobile-sub-list a').forEach(a => a.classList.remove('active'));
        if (activeLink) activeLink.classList.add('active');
      }

      function exitGallery() {
        clearTimeout(galleryTimer);
        galleryMode = false;
        stage.classList.remove('gallery');
        galleryTitle.innerHTML = '';
        document.querySelectorAll('.sub-list a, #mobile-sub-list a').forEach(a => a.classList.remove('active'));
      }

      function bindSubLinks(container) {
        container.querySelectorAll('a').forEach(a => {
          a.addEventListener('click', e => {
            e.preventDefault();
            const name = a.textContent.trim();
            const info = subInfoMap[name] || {};
            if (info.type === 'grid') {
              let targetCatId = null;
              categories.forEach(cat => {
                cat.subcategories.forEach(sub => { if (sub.name === name) targetCatId = cat.id; });
              });
              exitGallery();
              closeSplitView();
              if (targetCatId) openGridView(targetCatId);
            } else if (info.type === 'split') {
              exitGallery();
              closeGridView();
              openSplitView(name);
            } else {
              closeGridView();
              closeSplitView();
              enterGallery(name, a);
            }
          });
        });
      }

      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.querySelector('.nav-label').addEventListener('click', () => {
          const cat    = item.dataset.cat;
          const isOpen = item.classList.contains('open');
          const navListEl = document.querySelector('.nav-list');
          const isGridCat = !!gridDataMap[cat];

          if (isMobile()) {
            const sameOpen = mobileSubBar.classList.contains('open') && mobileSubBar.dataset.cat === cat;
            navItems.forEach(i => i.classList.remove('open'));
            if (sameOpen) {
              mobileSubBar.classList.remove('open');
              closeGridView();
            } else {
              mobileSubBar.dataset.cat = cat;
              mobileSubBar.classList.add('open');
              mobileSubList.innerHTML = (subDataMap[cat] || []).map(s => `<li><a href="#">${s}</a></li>`).join('');
              bindSubLinks(mobileSubList);
              navListEl.prepend(item);
              const navRect = document.getElementById('main-nav').getBoundingClientRect();
              mobileSubBar.style.top  = navRect.bottom + 1 + 'px';
              mobileSubBar.style.left = navRect.left + 'px';
              // 첫 번째 서브카테고리 type에 따라 자동 오픈
              if (subDataMap[cat] && subDataMap[cat].length) {
                const firstName = subDataMap[cat][0];
                const firstInfo = subInfoMap[firstName] || {};
                const firstLink = mobileSubList.querySelector('a');
                if (firstInfo.type === 'grid') {
                  exitGallery();
                  closeSplitView();
                  document.querySelectorAll('#mobile-sub-list a').forEach(a => a.classList.remove('active'));
                  if (firstLink) firstLink.classList.add('active');
                  let targetCatId = null;
                  categories.forEach(c => {
                    c.subcategories.forEach(s => { if (s.name === firstName) targetCatId = c.id; });
                  });
                  if (targetCatId) openGridView(targetCatId);
                } else if (firstInfo.type === 'split') {
                  exitGallery();
                  closeGridView();
                  document.querySelectorAll('#mobile-sub-list a').forEach(a => a.classList.remove('active'));
                  if (firstLink) firstLink.classList.add('active');
                  openSplitView(firstName);
                } else {
                  closeGridView();
                  closeSplitView();
                  enterGallery(firstName, firstLink);
                }
              }
            }
          } else {
            navItems.forEach(i => i.classList.remove('open'));
            if (!isOpen) {
              item.classList.add('open');
              navListEl.prepend(item);
              bindSubLinks(item.querySelector('.sub-list'));
              // 첫 번째 서브카테고리의 type에 따라 적절한 뷰 자동 오픈
              if (subDataMap[cat] && subDataMap[cat].length) {
                const firstName = subDataMap[cat][0];
                const firstInfo = subInfoMap[firstName] || {};
                const firstLink = item.querySelector('.sub-list a');
                if (firstInfo.type === 'grid') {
                  exitGallery();
                  closeSplitView();
                  document.querySelectorAll('.sub-list a').forEach(a => a.classList.remove('active'));
                  if (firstLink) firstLink.classList.add('active');
                  let targetCatId = null;
                  categories.forEach(c => {
                    c.subcategories.forEach(s => { if (s.name === firstName) targetCatId = c.id; });
                  });
                  if (targetCatId) openGridView(targetCatId);
                } else if (firstInfo.type === 'split') {
                  exitGallery();
                  closeGridView();
                  document.querySelectorAll('.sub-list a').forEach(a => a.classList.remove('active'));
                  if (firstLink) firstLink.classList.add('active');
                  openSplitView(firstName);
                } else {
                  closeGridView();
                  closeSplitView();
                  enterGallery(firstName, firstLink);
                }
              }
            } else {
              exitGallery();
              closeGridView();
              closeSplitView();
            }
          }
        });
      });

      document.addEventListener('click', e => {
        if (gridViewMode || splitViewMode) return;
        if (!e.target.closest('#main-nav') && !e.target.closest('#mobile-sub-bar') && !e.target.closest('#gallery-overlay') && !e.target.closest('#grid-view') && !e.target.closest('#split-view')) {
          navItems.forEach(i => i.classList.remove('open'));
          mobileSubBar.classList.remove('open');
          if (catPhotoMode) exitPhotoMode();
          exitGallery();
        }
      });

      window.addEventListener('wheel', e => {
        if (gridViewMode || splitViewMode) return;
        e.preventDefault();
        if (galleryMode) return;
        const idx = catPhotoMode ? catCurrent : current;
        (e.deltaY > 0 || e.deltaX > 0) ? goTo(idx + 1) : goTo(idx - 1);
      }, { passive: false });

      window.addEventListener('keydown', e => {
        if (gridViewMode || splitViewMode) return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo((catPhotoMode ? catCurrent : current) + 1);
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo((catPhotoMode ? catCurrent : current) - 1);
        if (e.key === 'Escape') { closeGridView(); closeSplitView(); exitGallery(); navItems.forEach(i => i.classList.remove('open')); }
      });
    })();
  </script>
</body>
</html>
