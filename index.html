<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jinho.kim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #111111;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    /* ── HEADER ── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 36px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-brand {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .header-nav {
      display: flex;
      list-style: none;
    }

    .header-nav li::after {
      content: ',\00a0';
      font-size: 0.72rem;
      opacity: 0.4;
    }

    .header-nav li:last-child::after { content: ''; }

    .header-nav a {
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      color: #111;
      text-decoration: none;
      opacity: 0.5;
    }

    .header-nav a:hover { opacity: 1; }

    .header-right {
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      opacity: 0.5;
    }

    /* ── PHOTO STAGE ── */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo {
      position: absolute;
      max-height: 80vh;
      max-width: 62vw;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .photo.active { opacity: 1; }

    /* ── COUNTER ── */
    #counter {
      position: fixed;
      bottom: 28px;
      right: 36px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      opacity: 0.3;
      z-index: 100;
    }

    @media (max-width: 600px) {
      #site-header { padding: 20px; }
      .photo { max-width: 90vw; max-height: 72vh; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <div class="header-left">
      <span class="header-brand">jinho.kim</span>
      <nav>
        <ul class="header-nav">
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Exhibition</a></li>
          <li><a href="#">About</a></li>
        </ul>
      </nav>
    </div>
    <span class="header-right">Contact ↗</span>
  </header>

  <div id="stage"></div>

  <div id="counter"></div>

  <script>
    const others = [
      '098DE0F3-54EF-4637-AE30-C47B0A97048F.JPG',
      '22FA7B59-0450-4CCA-9E02-85496CA06066.JPG',
      '395577AD-ABA3-4C88-9E13-B53F79D32834.JPG',
      '6D55E0DF-18FB-427A-A7F1-496689AD6CE8.JPG',
      '88F17B32-5C41-4B35-AAE7-870BCC81E98D.JPG',
      'DSC00767.JPG','DSC01006.JPG','DSC01018.JPG','DSC01256.JPG',
      'DSC01334.JPG','DSC01339.JPG','DSC01957.JPG','DSC02216.JPG',
      'DSC02393.JPG','DSC02414.JPG','DSC02546.JPG','DSC02729.JPG',
      'DSC03327.JPG','DSC03336.JPG','DSC03417.JPG','DSC03858.JPG',
      'DSC03877.JPG','DSC03933-2.JPG',
      'E83CD9E7-D748-457F-9D63-940DF73708B8.JPG','IMG_9481.JPG'
    ];

    /* 셔플 */
    for (let i = others.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [others[i], others[j]] = [others[j], others[i]];
    }

    const all = ['intro-cover.JPG', ...others];
    const stage   = document.getElementById('stage');
    const counter = document.getElementById('counter');
    const N = all.length;

    all.forEach((name, i) => {
      const img = document.createElement('img');
      img.className = 'photo' + (i === 0 ? ' active' : '');
      img.src = `./images/${name}`;
      img.alt = '';
      stage.appendChild(img);
    });

    const photos = Array.from(stage.querySelectorAll('.photo'));
    let current = 0;
    let busy = false;

    counter.textContent = `01 / ${String(N).padStart(2,'0')}`;

    function goTo(idx) {
      if (busy) return;
      idx = Math.max(0, Math.min(N - 1, idx));
      if (idx === current) return;
      busy = true;
      photos[current].classList.remove('active');
      photos[idx].classList.add('active');
      current = idx;
      counter.textContent = `${String(current + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
      setTimeout(() => { busy = false; }, 200);
    }

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      (e.deltaY > 0 || e.deltaX > 0) ? goTo(current + 1) : goTo(current - 1);
    }, { passive: false });

    /* 터치 — 이동 거리 누적해서 연속 전환 (PC 휠과 동일한 느낌) */
    const SWIPE_THRESHOLD = 55;
    let touchX = null;
    let touchAccum = 0;

    window.addEventListener('touchstart', e => {
      touchX = e.touches[0].clientX;
      touchAccum = 0;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (touchX === null) return;
      const dx = touchX - e.touches[0].clientX;
      touchX = e.touches[0].clientX;
      touchAccum += dx;
      while (touchAccum >=  SWIPE_THRESHOLD) { goTo(current + 1); touchAccum -= SWIPE_THRESHOLD; }
      while (touchAccum <= -SWIPE_THRESHOLD) { goTo(current - 1); touchAccum += SWIPE_THRESHOLD; }
    }, { passive: true });

    window.addEventListener('touchend', () => { touchX = null; touchAccum = 0; });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
    });
  </script>
</body>
</html>
