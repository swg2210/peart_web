<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jinho.kim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #111111;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    /* ── HEADER ── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 36px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-brand {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: row;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0;
    }

    .nav-item {
      position: relative;
      display: inline;
    }

    .nav-label::after {
      content: ',\00a0';
      opacity: 0.4;
    }

    .nav-item:last-child .nav-label::after { content: ''; }

    .nav-label {
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      color: #111;
      opacity: 0.5;
      cursor: pointer;
      user-select: none;
    }

    .nav-item.open > .nav-label { opacity: 1; }

    .sub-list {
      list-style: none;
      display: none;
      flex-direction: column;
      gap: 2px;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      white-space: nowrap;
    }

    .nav-item.open .sub-list { display: flex; }

    .sub-list a {
      font-size: 0.65rem;
      letter-spacing: 0.02em;
      color: #111;
      text-decoration: none;
      opacity: 0.35;
      display: block;
    }

    .sub-list a:hover { opacity: 0.7; }
    .sub-list a.active { opacity: 1; }

    .header-right {
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      opacity: 0.5;
      text-decoration: none;
      color: #111;
    }

    .header-right:hover { opacity: 1; }

    /* ── MOBILE ── */
    #mobile-sub-bar { display: none; }

    @media (max-width: 768px) {
      #site-header { padding: 20px; }
      .sub-list { display: none !important; }

      #mobile-sub-bar {
        display: none;
        position: fixed;
        left: 20px;
        z-index: 200;
        padding: 0;
      }

      #mobile-sub-bar.open { display: block; }

      #mobile-sub-list {
        list-style: none;
        display: flex;
        gap: 20px;
      }

      #mobile-sub-list a {
        font-size: 0.65rem;
        letter-spacing: 0.02em;
        color: #111;
        text-decoration: none;
        opacity: 0.35;
        white-space: nowrap;
      }

      #mobile-sub-list a:hover { opacity: 0.7; }
      #mobile-sub-list a.active { opacity: 1; }
    }

    /* ── PHOTO STAGE ── */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo {
      position: absolute;
      max-height: 80vh;
      max-width: 62vw;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .photo.active { opacity: 1; }

    /* ── GALLERY MODE ── */
    #stage.gallery .photo { opacity: 0 !important; }

    #gallery-title {
      display: none;
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 52vw;
      padding: 0 80px 0 48px;
      pointer-events: none;
      z-index: 50;
    }

    #gallery-title .g-main {
      font-family: 'EB Garamond', serif;
      font-size: 3.6rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #111;
      line-height: 1.05;
      margin-bottom: 14px;
    }

    #gallery-title .g-sub {
      font-size: 0.8rem;
      font-weight: 300;
      color: #111;
      opacity: 0.45;
      letter-spacing: 0.01em;
    }

    #stage.gallery + #gallery-overlay { display: block; }
    #stage.gallery ~ #gallery-title   { display: block; }
    #stage.gallery ~ #counter         { display: none; }

    #gallery-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      cursor: pointer;
    }

    /* ── COUNTER ── */
    #counter {
      position: fixed;
      bottom: 28px;
      right: 36px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      opacity: 0.3;
      z-index: 100;
    }

    @media (max-width: 600px) {
      .photo { max-width: 90vw; max-height: 72vh; }
    }

    @media (max-width: 768px) {
      #gallery-title {
        width: 90vw;
        left: 50%;
        right: auto;
        transform: translateX(-50%) translateY(-50%);
        padding: 0;
        text-align: center;
      }
      #gallery-title .g-main { font-size: 2.4rem; white-space: nowrap; }
      #gallery-title .g-sub  { white-space: nowrap; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <div class="header-left">
      <span class="header-brand">jinho.kim</span>
      <nav id="main-nav">
        <ul class="nav-list" id="nav-list"></ul>
      </nav>
    </div>
    <a class="header-right" href="https://www.instagram.com/__peart?igsh=MTVoaG02NW1qMXJvOQ==" target="_blank" rel="noopener">Contact ↗</a>
  </header>

  <div id="mobile-sub-bar">
    <ul id="mobile-sub-list"></ul>
  </div>

  <div id="stage"></div>
  <div id="gallery-overlay"></div>
  <div id="gallery-title"></div>
  <div id="counter"></div>

  <script>
    (async () => {
      // ── data.json 로드 ──
      let siteData;
      try {
        const res = await fetch('./data.json?t=' + Date.now());
        siteData = await res.json();
      } catch (e) {
        console.error('data.json 로드 실패', e);
        return;
      }

      const { allPhotos, categories } = siteData;

      // ── 포토 스테이지 구성 (intro-cover 첫 번째, 나머지 셔플) ──
      const introPhoto = allPhotos[0];
      const rest = allPhotos.slice(1);
      for (let i = rest.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [rest[i], rest[j]] = [rest[j], rest[i]];
      }
      const all = [introPhoto, ...rest];
      const N = all.length;

      const stage   = document.getElementById('stage');
      const counter = document.getElementById('counter');

      all.forEach((src, i) => {
        const img = document.createElement('img');
        img.className = 'photo' + (i === 0 ? ' active' : '');
        img.src = src;
        img.alt = '';
        stage.appendChild(img);
      });

      const photos = Array.from(stage.querySelectorAll('.photo'));
      let current = 0;
      let busy = false;
      let catPhotoMode = false;
      let catPhotoIndices = [];
      let catCurrent = 0;

      counter.textContent = `01 / ${String(N).padStart(2, '0')}`;

      // ── 카테고리 데이터 맵 ──
      const subDataMap   = {};  // catId -> [subName, ...]
      const subInfoMap   = {};  // subName -> { title, subtitle }
      const catPhotosMap = {};  // subName -> [photoSrc, ...]

      categories.forEach(cat => {
        subDataMap[cat.id] = cat.subcategories.map(s => s.name);
        cat.subcategories.forEach(sub => {
          subInfoMap[sub.name]   = { title: sub.title, subtitle: sub.subtitle };
          catPhotosMap[sub.name] = sub.photos;
        });
      });

      // ── Nav 동적 생성 ──
      const navList = document.getElementById('nav-list');
      categories.forEach(cat => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.dataset.cat = cat.id;
        li.innerHTML = `
          <span class="nav-label">${cat.label}</span>
          <ul class="sub-list">
            ${cat.subcategories.map(s => `<li><a href="#">${s.name}</a></li>`).join('')}
          </ul>`;
        navList.appendChild(li);
      });

      // ── 포토 전환 ──
      function goTo(idx) {
        if (busy) return;
        if (catPhotoMode) {
          idx = Math.max(0, Math.min(catPhotoIndices.length - 1, idx));
          if (idx === catCurrent) return;
          busy = true;
          photos[catPhotoIndices[catCurrent]].classList.remove('active');
          photos[catPhotoIndices[idx]].classList.add('active');
          catCurrent = idx;
          counter.textContent = `${String(catCurrent + 1).padStart(2, '0')} / ${String(catPhotoIndices.length).padStart(2, '0')}`;
          setTimeout(() => { busy = false; }, 200);
          return;
        }
        idx = Math.max(0, Math.min(N - 1, idx));
        if (idx === current) return;
        busy = true;
        photos[current].classList.remove('active');
        photos[idx].classList.add('active');
        current = idx;
        counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(N).padStart(2, '0')}`;
        setTimeout(() => { busy = false; }, 200);
      }

      function enterPhotoMode(subName) {
        const photoSet = catPhotosMap[subName] || [];
        if (!photoSet.length) return;
        catPhotoMode = true;
        photos.forEach(p => p.classList.remove('active'));
        catPhotoIndices = [];
        photos.forEach((p, i) => {
          const psrc = decodeURIComponent(p.src);
          if (photoSet.some(ps => {
            const normalized = ps.startsWith('http') ? ps : ps.replace('./', '');
            return psrc.endsWith(normalized) || psrc.includes(normalized);
          })) {
            catPhotoIndices.push(i);
          }
        });
        if (!catPhotoIndices.length) { catPhotoMode = false; return; }
        catCurrent = 0;
        photos[catPhotoIndices[0]].classList.add('active');
        counter.textContent = `01 / ${String(catPhotoIndices.length).padStart(2, '0')}`;
      }

      function exitPhotoMode() {
        catPhotoMode = false;
        photos.forEach(p => p.classList.remove('active'));
        photos[current].classList.add('active');
        counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(N).padStart(2, '0')}`;
      }

      // ── 스크롤 / 스와이프 ──
      window.addEventListener('wheel', e => {
        e.preventDefault();
        if (galleryMode) return;
        const idx = catPhotoMode ? catCurrent : current;
        (e.deltaY > 0 || e.deltaX > 0) ? goTo(idx + 1) : goTo(idx - 1);
      }, { passive: false });

      const SWIPE_THRESHOLD = 55;
      let touchX = null, touchAccum = 0;

      window.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchAccum = 0; }, { passive: true });
      window.addEventListener('touchmove', e => {
        if (touchX === null || galleryMode) return;
        const dx = touchX - e.touches[0].clientX;
        touchX = e.touches[0].clientX;
        touchAccum += dx;
        while (touchAccum >=  SWIPE_THRESHOLD) { goTo((catPhotoMode ? catCurrent : current) + 1); touchAccum -= SWIPE_THRESHOLD; }
        while (touchAccum <= -SWIPE_THRESHOLD) { goTo((catPhotoMode ? catCurrent : current) - 1); touchAccum += SWIPE_THRESHOLD; }
      }, { passive: true });
      window.addEventListener('touchend', () => { touchX = null; touchAccum = 0; });

      // ── 갤러리 모드 ──
      const mobileSubBar  = document.getElementById('mobile-sub-bar');
      const mobileSubList = document.getElementById('mobile-sub-list');
      const galleryTitle  = document.getElementById('gallery-title');
      const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

      let galleryMode = false;
      let currentActiveLink = null;
      let galleryTimer = null;

      function enterGallery(title, activeLink) {
        currentActiveLink = activeLink;
        galleryMode = true;
        catPhotoMode = false;
        stage.classList.add('gallery');
        clearTimeout(galleryTimer);
        galleryTimer = setTimeout(() => {
          if (galleryMode) {
            const link = currentActiveLink;
            exitGallery();
            enterPhotoMode(title);
            if (link) link.classList.add('active');
          }
        }, 2000);

        const info = subInfoMap[title] || {};
        const displayTitle = info.title || title;
        const displaySub   = info.subtitle || '';
        galleryTitle.innerHTML = `<div class="g-main">${displayTitle}</div>${displaySub ? `<div class="g-sub">${displaySub}</div>` : ''}`;

        document.querySelectorAll('.sub-list a, #mobile-sub-list a').forEach(a => a.classList.remove('active'));
        if (activeLink) activeLink.classList.add('active');
      }

      function exitGallery() {
        clearTimeout(galleryTimer);
        galleryMode = false;
        stage.classList.remove('gallery');
        galleryTitle.innerHTML = '';
        document.querySelectorAll('.sub-list a, #mobile-sub-list a').forEach(a => a.classList.remove('active'));
      }

      function bindSubLinks(container) {
        container.querySelectorAll('a').forEach(a => {
          a.addEventListener('click', e => {
            e.preventDefault();
            enterGallery(a.textContent.trim(), a);
          });
        });
      }

      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.querySelector('.nav-label').addEventListener('click', () => {
          const cat    = item.dataset.cat;
          const isOpen = item.classList.contains('open');
          const navListEl = document.querySelector('.nav-list');

          if (isMobile()) {
            const sameOpen = mobileSubBar.classList.contains('open') && mobileSubBar.dataset.cat === cat;
            navItems.forEach(i => i.classList.remove('open'));
            if (sameOpen) {
              mobileSubBar.classList.remove('open');
            } else {
              mobileSubBar.dataset.cat = cat;
              mobileSubBar.classList.add('open');
              mobileSubList.innerHTML = (subDataMap[cat] || []).map(s => `<li><a href="#">${s}</a></li>`).join('');
              bindSubLinks(mobileSubList);
              navListEl.prepend(item);
              const navRect = document.getElementById('main-nav').getBoundingClientRect();
              mobileSubBar.style.top  = navRect.bottom + 1 + 'px';
              mobileSubBar.style.left = navRect.left + 'px';
              const firstLink = mobileSubList.querySelector('a');
              if (subDataMap[cat] && subDataMap[cat].length) enterGallery(subDataMap[cat][0], firstLink);
            }
          } else {
            navItems.forEach(i => i.classList.remove('open'));
            if (!isOpen) {
              item.classList.add('open');
              navListEl.prepend(item);
              bindSubLinks(item.querySelector('.sub-list'));
              const firstLink = item.querySelector('.sub-list a');
              if (subDataMap[cat] && subDataMap[cat].length) enterGallery(subDataMap[cat][0], firstLink);
            } else {
              exitGallery();
            }
          }
        });
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('#main-nav') && !e.target.closest('#mobile-sub-bar') && !e.target.closest('#gallery-overlay')) {
          navItems.forEach(i => i.classList.remove('open'));
          mobileSubBar.classList.remove('open');
          if (catPhotoMode) exitPhotoMode();
          exitGallery();
        }
      });

      window.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo((catPhotoMode ? catCurrent : current) + 1);
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo((catPhotoMode ? catCurrent : current) - 1);
      });
    })();
  </script>
</body>
</html>
